<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReviewBot — System Configuration</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', 'Inter', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; }

    header { display: none; } /* Handled by shared-header */

    /* ── Layout ─────────────────────────────────────────────────────────────── */
    main { flex: 1; max-width: 1200px; margin: 0 auto; width: 100%; padding: 40px 24px; }
    
    /* ── Page Header ────────────────────────────────────────────────────────── */
    .page-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 32px; }
    .page-title h1 { font-size: 28px; font-weight: 800; color: #f1f5f9; margin-bottom: 8px; }
    .page-title p { color: #94a3b8; font-size: 14px; max-width: 600px; }

    /* ── Buttons ─────────────────────────────────────────────────────────────── */
    .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: #0ea5e9; color: #fff; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); }
    .btn-primary:hover { background: #38bdf8; transform: translateY(-1px); }
    .btn-secondary { background: rgba(30, 41, 59, 0.5); border-color: rgba(255,255,255,0.1); color: #e2e8f0; }
    .btn-secondary:hover { background: rgba(30, 41, 59, 0.8); border-color: rgba(255,255,255,0.2); }
    .btn-danger { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3); color: #f87171; }
    .btn-danger:hover { background: #ef4444; color: #fff; }
    .btn-sm { padding: 6px 14px; font-size: 12px; }

    /* ── Config Grid ────────────────────────────────────────────────────────── */
    .config-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
    .config-card { background: #1e293b; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 24px; position: relative; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: default; }
    .config-card:hover { border-color: rgba(56, 189, 248, 0.3); transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.2); }
    .config-card.active { border-color: #0ea5e9; box-shadow: 0 0 0 1px #0ea5e9, 0 8px 24px rgba(14, 165, 233, 0.15); }
    
    .card-badge { position: absolute; top: 20px; right: 20px; padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .active-badge { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
    
    .card-provider { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; margin-bottom: 4px; }
    .card-name { font-size: 18px; font-weight: 700; color: #f1f5f9; margin-bottom: 12px; }
    
    .card-details { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 20px; }
    .detail-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #94a3b8; }
    .detail-item strong { color: #cbd5e1; min-width: 80px; }
    
    .card-actions { display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }

    /* ── Tabs ─────────────────────────────────────────────────────────────── */
    .tabs { display: flex; gap: 24px; margin-bottom: 32px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .tab-btn { background: transparent; border: none; font-size: 15px; font-weight: 700; color: #64748b; padding: 12px 4px; cursor: pointer; position: relative; transition: all 0.2s; }
    .tab-btn:hover { color: #f1f5f9; }
    .tab-btn.active { color: #38bdf8; }
    .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: #38bdf8; box-shadow: 0 0 12px rgba(56, 189, 248, 0.5); }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ── System Settings ───────────────────────────────────────────────────── */
    .settings-group { background: #1e293b; border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 32px; margin-bottom: 24px; }
    .settings-group-header { margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
    .settings-group-header h3 { font-size: 18px; font-weight: 700; color: #f1f5f9; }
    .settings-group-header .icon { width: 32px; height: 32px; border-radius: 8px; background: rgba(56, 189, 248, 0.1); display: flex; align-items: center; justify-content: center; color: #38bdf8; }
    
    .setting-item { display: grid; grid-template-columns: 240px 1fr 120px; gap: 24px; align-items: center; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .setting-item:last-child { border-bottom: none; }
    .setting-label { font-size: 14px; font-weight: 600; color: #f1f5f9; display: flex; align-items: center; gap: 8px; }
    .setting-desc { font-size: 12px; color: #94a3b8; margin-top: 4px; display: block; }
    .mandatory-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); padding: 2px 6px; border-radius: 4px; }
    .optional-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; background: rgba(255,255,255,0.05); color: #64748b; border: 1px solid rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; }

    /* ── Modal ─────────────────────────────────────────────────────────────── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: all 0.3s; }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-card { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 32px; width: 100%; max-width: 500px; transform: scale(0.95); transition: all 0.3s; }
    .modal-overlay.active .modal-card { transform: scale(1); }
    
    .modal-header { margin-bottom: 24px; }
    .modal-header h2 { font-size: 20px; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; }
    .modal-header p { font-size: 14px; color: #94a3b8; }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    input, select, textarea { width: 100%; background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 14px; color: #f1f5f9; font-size: 14px; transition: all 0.2s; }
    input:focus, select:focus { outline: none; border-color: #0ea5e9; box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.2); }
    
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    
    .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 32px; }

    /* ── Empty State ────────────────────────────────────────────────────────── */
    .empty-state { text-align: center; padding: 80px 20px; background: rgba(30, 41, 59, 0.3); border: 2px dashed rgba(255,255,255,0.05); border-radius: 20px; }
    .empty-state-icon { font-size: 48px; margin-bottom: 20px; opacity: 0.5; }
    .empty-state h3 { font-size: 18px; font-weight: 700; color: #f1f5f9; margin-bottom: 8px; }
    .empty-state p { color: #64748b; font-size: 14px; margin-bottom: 24px; }

    /* ── Notifications ──────────────────────────────────────────────────────── */
    #notif-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
    .notif { padding: 12px 24px; border-radius: 10px; background: #1e293b; color: #f1f5f9; font-size: 14px; font-weight: 600; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 16px rgba(0,0,0,0.3); animation: slideIn 0.3s ease-out; }
    .notif-success { border-left: 4px solid #22c55e; }
    .notif-error { border-left: 4px solid #ef4444; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ── Icons ─────────────────────────────────────────────────────────────── */
    svg { vertical-align: middle; }
    
    footer { padding: 40px 24px; text-align: center; color: #475569; font-size: 13px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 40px; }
  </style>
</head>
<body>

<!-- ── Shared Header ─────────────────────────────────────────────────────── -->
<div id="shared-header-root"></div>

<main>
  <div class="page-header">
    <div class="page-title">
      <h1>Configuration Center</h1>
      <p>Manage AI providers, system behaviors, and global defaults.</p>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('llm-models')">AI Models</button>
    <button class="tab-btn" onclick="showTab('system-settings')">System Settings</button>
  </div>

  <div id="llm-models" class="tab-content active">
    <div style="display:flex; justify-content:flex-end; margin-bottom:20px;">
      <button class="btn btn-primary" onclick="openCreateModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        Add Provider
      </button>
    </div>
    <div id="config-list" class="config-grid">
      <div class="empty-state" id="loading-state">
        <div class="empty-state-icon">⌛</div>
        <h3>Loading AI configurations...</h3>
      </div>
    </div>
  </div>

  <div id="system-settings" class="tab-content">
    <div id="settings-container">
      <!-- Settings grouped by category will be injected here -->
      <div class="empty-state">
        <div class="empty-state-icon">⌛</div>
        <h3>Loading system settings...</h3>
      </div>
    </div>
  </div>
</main>

<footer>
  &copy; 2026 ReviewBot — Managed AI Tech & Delivery Reviews
</footer>

<!-- ── Modals ────────────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="config-modal">
  <div class="modal-card">
    <div class="modal-header">
      <h2 id="modal-title">New Configuration</h2>
      <p id="modal-subtitle">Configure a new LLM provider and model.</p>
    </div>
    
    <form id="config-form">
      <input type="hidden" id="field-id">
      
      <div class="form-group">
        <label for="field-name">Friendly Name</label>
        <input type="text" id="field-name" placeholder="e.g. Production GPT-4o" required>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="field-provider">Provider</label>
          <select id="field-provider" required onchange="handleProviderChange()">
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic</option>
            <option value="google">Google Gemini</option>
            <option value="groq">Groq</option>
            <option value="azure">Azure OpenAI</option>
            <option value="custom">Custom (OpenAI Compatible)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="field-model">Model Name</label>
          <input type="text" id="field-model" placeholder="e.g. gpt-4o-mini" list="model-suggestions" required>
          <datalist id="model-suggestions"></datalist>
        </div>
      </div>
      
      <div class="form-group">
        <label for="field-api-key">API Key</label>
        <input type="password" id="field-api-key" placeholder="sk-..." required>
      </div>
      
      <div class="form-group" id="group-base-url">
        <label for="field-base-url">Base URL (Optional)</label>
        <input type="text" id="field-base-url" placeholder="https://api.openai.com/v1">
      </div>
      
      <div class="form-group" id="group-api-version" style="display:none">
        <label for="field-api-version">API Version (Azure)</label>
        <input type="text" id="field-api-version" placeholder="2024-02-15-preview">
      </div>

      <div class="form-group">
        <label for="field-max-requests">Max Requests Limit (Optional)</label>
        <input type="number" id="field-max-requests" placeholder="e.g. 1000">
      </div>

      <div class="form-group">
        <label style="display:flex; align-items:center; gap:10px; cursor:pointer; text-transform:none;">
          <input type="checkbox" id="field-is-active" style="width:auto;">
          Set as active configuration
        </label>
      </div>
      
      <div id="test-result" style="display:none; margin-top:16px; padding:12px; border-radius:8px; font-size:13px; border:1px solid rgba(255,255,255,0.1);">
        <div id="test-status" style="font-weight:700; margin-bottom:4px;"></div>
        <div id="test-message" style="color:#94a3b8; font-family:monospace; word-break:break-all;"></div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="btn-test" onclick="testConnection()">Test Connection</button>
        <div style="flex:1"></div>
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="btn-save">Save Configuration</button>
      </div>
    </form>
  </div>
</div>

<div id="notif-container"></div>

<script src="/frontend_vanilla/components/header_loader.js"></script>
<script src="/frontend_vanilla/components/footer-loader.js"></script>
<script>
  const TOKEN_KEY = 'rb_token';
  const API_BASE = '/api/llm-configs';

  let configs = [];

  // --- Auth helpers ---
  function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
  
  async function apiFetch(url, options = {}) {
    const headers = {
      'Authorization': `Bearer ${getToken()}`,
      'Content-Type': 'application/json',
      ...options.headers
    };
    
    try {
      const response = await fetch(url, { ...options, headers });
      if (response.status === 401 || response.status === 403) {
        window.location.href = '/dashboard';
        return;
      }
      if (!response.ok) {
        const error = await response.json();
        throw new Error(error.detail || 'API request failed');
      }
      if (response.status === 204) return null;
      return await response.json();
    } catch (err) {
      showNotif(err.message, 'error');
      throw err;
    }
  }

  // --- UI Logic ---
  async function loadConfigs() {
    try {
      configs = await apiFetch(API_BASE);
      renderConfigs();
    } catch (err) {
      document.getElementById('config-list').innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">⚠️</div>
          <h3>Failed to load configurations</h3>
          <p>${err.message}</p>
          <button class="btn btn-secondary btn-sm" onclick="loadConfigs()">Retry</button>
        </div>
      `;
    }
  }

  function renderConfigs() {
    const container = document.getElementById('config-list');
    if (configs.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🤖</div>
          <h3>No LLM configurations yet</h3>
          <p>Add your first provider configuration to start using AI reviews.</p>
          <button class="btn btn-primary btn-sm" onclick="openCreateModal()">Add Configuration</button>
        </div>
      `;
      return;
    }

    container.innerHTML = configs.map(c => `
      <div class="config-card ${c.is_active ? 'active' : ''}">
        ${c.is_active ? '<div class="card-badge active-badge">Active</div>' : ''}
        <div class="card-provider">${c.provider}</div>
        <div class="card-name">${c.name}</div>
        
        <div class="card-details">
          <div class="detail-item"><strong>Model:</strong> ${c.model_name}</div>
          <div class="detail-item"><strong>API Key:</strong> ••••••••${c.api_key.slice(-4)}</div>
          ${c.base_url ? `<div class="detail-item"><strong>Base URL:</strong> ${c.base_url}</div>` : ''}
          <div class="detail-item"><strong>Usage:</strong> ${c.total_requests_made || 0} reqs ${c.max_requests_limit ? `/ ${c.max_requests_limit}` : '(No limit)'}</div>
        </div>
        
        <div class="card-actions">
          ${!c.is_active ? `
            <button class="btn btn-primary btn-sm" onclick="activateConfig(${c.id})">
              Activate
            </button>
          ` : ''}
          <button class="btn btn-secondary btn-sm" onclick="openEditModal(${c.id})">
            Edit
          </button>
          <button class="btn btn-danger btn-sm" onclick="deleteConfig(${c.id})">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
          </button>
        </div>
      </div>
    `).join('');
  }

  function openCreateModal() {
    document.getElementById('modal-title').textContent = 'New Configuration';
    document.getElementById('modal-subtitle').textContent = 'Configure a new LLM provider and model.';
    document.getElementById('config-form').reset();
    document.getElementById('field-id').value = '';
    document.getElementById('config-modal').classList.add('active');
    handleProviderChange();
  }

  function openEditModal(id) {
    const config = configs.find(c => c.id === id);
    if (!config) return;

    document.getElementById('modal-title').textContent = 'Edit Configuration';
    document.getElementById('modal-subtitle').textContent = 'Update existing provider settings.';
    
    document.getElementById('field-id').value = config.id;
    document.getElementById('field-name').value = config.name;
    document.getElementById('field-provider').value = config.provider;
    document.getElementById('field-model').value = config.model_name;
    document.getElementById('field-api-key').value = config.api_key;
    document.getElementById('field-base-url').value = config.base_url || '';
    document.getElementById('field-api-version').value = config.api_version || '';
    document.getElementById('field-max-requests').value = config.max_requests_limit || '';
    document.getElementById('field-is-active').checked = config.is_active;

    document.getElementById('config-modal').classList.add('active');
    handleProviderChange();
  }

  function closeModal() {
    document.getElementById('config-modal').classList.remove('active');
    document.getElementById('test-result').style.display = 'none';
  }

  const PROVIDER_MODELS = {
    'openai': ['gpt-4o', 'gpt-4o-mini', 'gpt-4-turbo', 'gpt-3.5-turbo'],
    'anthropic': ['claude-3-5-sonnet-20240620', 'claude-3-opus-20240229', 'claude-3-sonnet-20240229', 'claude-3-haiku-20240307'],
    'google': ['models/gemini-1.5-flash-latest', 'models/gemini-1.5-pro-latest', 'models/gemini-2.5-flash-preview-tts', 'models/gemma-3-27b-it'],
    'groq': ['llama-3.3-70b-versatile', 'llama-3.1-8b-instant', 'meta-llama/llama-4-scout-17b-16e-instruct', 'mixtral-8x7b-32768'],
    'azure': ['gpt-4o', 'gpt-4', 'gpt-35-turbo'],
    'qwen': ['qwen-max', 'qwen-plus', 'qwen-turbo', 'qwen-long']
  };

  function handleProviderChange() {
    const provider = document.getElementById('field-provider').value;
    const urlGroup = document.getElementById('group-base-url');
    const versionGroup = document.getElementById('group-api-version');
    const datalist = document.getElementById('model-suggestions');
    
    // Update model suggestions
    datalist.innerHTML = (PROVIDER_MODELS[provider] || []).map(m => `<option value="${m}">`).join('');

    if (provider === 'azure') {
      versionGroup.style.display = 'block';
      urlGroup.style.display = 'block';
    } else if (provider === 'custom') {
      versionGroup.style.display = 'none';
      urlGroup.style.display = 'block';
    } else {
      versionGroup.style.display = 'none';
      // Auto-fill some common base URLs if empty
      const urlField = document.getElementById('field-base-url');
      if (!urlField.value) {
        if (provider === 'groq') urlField.value = 'https://api.groq.com/openai/v1';
      }
    }
  }

  async function testConnection() {
    const btn = document.getElementById('btn-test');
    const resultArea = document.getElementById('test-result');
    const statusEl = document.getElementById('test-status');
    const messageEl = document.getElementById('test-message');

    const data = {
      name: document.getElementById('field-name').value || 'Test Config',
      provider: document.getElementById('field-provider').value,
      model_name: document.getElementById('field-model').value,
      api_key: document.getElementById('field-api-key').value,
      base_url: document.getElementById('field-base-url').value || null,
      api_version: document.getElementById('field-api-version').value || null,
      is_active: false
    };

    if (!data.model_name || !data.api_key) {
      showNotif('Model Name and API Key are required to test', 'error');
      return;
    }

    try {
      btn.disabled = true;
      btn.textContent = 'Testing...';
      resultArea.style.display = 'block';
      resultArea.style.background = 'rgba(255,255,255,0.05)';
      statusEl.textContent = '⏳ Verifying connectivity...';
      statusEl.style.color = '#94a3b8';
      messageEl.textContent = '';

      const res = await fetch('/api/llm-test-direct', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${getToken()}`
        },
        body: JSON.stringify(data)
      }).then(r => r.json());

      if (res.success) {
        statusEl.textContent = '✅ Success';
        statusEl.style.color = '#4ade80';
        resultArea.style.background = 'rgba(34, 197, 94, 0.1)';
        resultArea.style.borderColor = 'rgba(34, 197, 94, 0.3)';
        messageEl.textContent = `AI Response: "${res.message}"`;
      } else {
        statusEl.textContent = '❌ Failed';
        statusEl.style.color = '#f87171';
        resultArea.style.background = 'rgba(239, 68, 68, 0.1)';
        resultArea.style.borderColor = 'rgba(239, 68, 68, 0.3)';
        messageEl.textContent = res.message;
      }
    } catch (err) {
      statusEl.textContent = '❌ Error';
      statusEl.style.color = '#f87171';
      messageEl.textContent = err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Test Connection';
    }
  }

  document.getElementById('config-form').onsubmit = async (e) => {
    e.preventDefault();
    const id = document.getElementById('field-id').value;
    const data = {
      name: document.getElementById('field-name').value,
      provider: document.getElementById('field-provider').value,
      model_name: document.getElementById('field-model').value,
      api_key: document.getElementById('field-api-key').value,
      base_url: document.getElementById('field-base-url').value || null,
      api_version: document.getElementById('field-api-version').value || null,
      max_requests_limit: document.getElementById('field-max-requests').value ? parseInt(document.getElementById('field-max-requests').value) : null,
      is_active: document.getElementById('field-is-active').checked
    };

    try {
      const btn = document.getElementById('btn-save');
      btn.disabled = true;
      btn.textContent = 'Saving...';

      if (id) {
        await apiFetch(`${API_BASE}/${id}`, {
          method: 'PATCH',
          body: JSON.stringify(data)
        });
        showNotif('Configuration updated successfully');
      } else {
        await apiFetch(API_BASE, {
          method: 'POST',
          body: JSON.stringify(data)
        });
        showNotif('New configuration added');
      }

      closeModal();
      loadConfigs();
    } catch (err) {
      // Notification handled in apiFetch
    } finally {
      const btn = document.getElementById('btn-save');
      btn.disabled = false;
      btn.textContent = 'Save Configuration';
    }
  };

  async function activateConfig(id) {
    try {
      await apiFetch(`${API_BASE}/${id}/activate`, { method: 'POST' });
      showNotif('Configuration activated');
      loadConfigs();
    } catch (err) {}
  }

  async function deleteConfig(id) {
    if (!confirm('Are you sure you want to delete this configuration?')) return;
    
    try {
      await apiFetch(`${API_BASE}/${id}`, { method: 'DELETE' });
      showNotif('Configuration deleted');
      loadConfigs();
    } catch (err) {}
  }

  function showNotif(msg, type = 'success') {
    const container = document.getElementById('notif-container');
    const el = document.createElement('div');
    el.className = `notif notif-${type}`;
    el.textContent = msg;
    container.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  // --- Tab Logic ---
  function showTab(id) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    
    document.querySelector(`.tab-btn[onclick="showTab('${id}')"]`).classList.add('active');
    document.getElementById(id).classList.add('active');

    if (id === 'system-settings') loadSettings();
    if (id === 'llm-models') loadConfigs();
  }

  // --- System Settings logic ---
  async function loadSettings() {
    try {
      const resp = await apiFetch('/api/settings');
      renderSettings(resp);
    } catch (err) {}
  }

  function renderSettings(list) {
    const container = document.getElementById('settings-container');
    const categories = [...new Set(list.map(s => s.category))];
    
    container.innerHTML = categories.map(cat => `
      <div class="settings-group">
        <div class="settings-group-header">
          <div class="icon">
            ${cat === 'Agent' ? '🤖' : cat === 'Security' ? '🔒' : cat === 'UI' ? '🎨' : '⚙️'}
          </div>
          <h3>${cat} Configuration</h3>
        </div>
        ${list.filter(s => s.category === cat).map(s => `
          <div class="setting-item">
            <div class="setting-info">
              <div class="setting-label">
                ${s.key}
                ${s.is_mandatory ? '<span class="mandatory-badge">Mandatory</span>' : '<span class="optional-badge">Optional</span>'}
              </div>
              <span class="setting-desc">${s.description}</span>
            </div>
            <div class="setting-input">
              ${s.value === 'true' || s.value === 'false' ? `
                <select onchange="updateSetting('${s.key}', this.value)">
                  <option value="true" ${s.value === 'true' ? 'selected' : ''}>Enabled</option>
                  <option value="false" ${s.value === 'false' ? 'selected' : ''}>Disabled</option>
                </select>
              ` : `
                <input type="text" value="${s.value}" onchange="updateSetting('${s.key}', this.value)">
              `}
            </div>
          </div>
        `).join('')}
      </div>
    `).join('');
  }

  async function updateSetting(key, val) {
    try {
      await apiFetch(`/api/settings/${key}`, {
        method: 'PATCH',
        body: JSON.stringify({ value: val })
      });
      showNotif(`Setting ${key} updated`);
      // No reload needed for simple items
    } catch (err) {}
  }

  // Init
  window.onload = () => {
    if (window.updateSharedUserInfo) window.updateSharedUserInfo();
    loadConfigs();
  };
</script>

</body>
</html>
