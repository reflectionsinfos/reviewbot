# ============================================
# AI Tech & Delivery Review Agent
# Docker Compose for Development & Production
# ============================================

version: '3.8'

services:
  # --------------------------------------------
  # Application Service
  # --------------------------------------------
  reviewbot-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-production}
    container_name: reviewbot-app
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      # Application
      - APP_NAME=${APP_NAME:-ReviewBot v2.0}
      - DEBUG=${DEBUG:-true}

      # Database (PostgreSQL)
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://review_user:review_password_change_me@reviewbot-db:5432/reviews_db}

      # API Keys - Multiple LLM Support (Configure all, but only one active at a time)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      
      # Alternative LLM Providers
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      
      # Active LLM Provider (Choose one: openai, anthropic, google, groq, qwen, azure)
      - ACTIVE_LLM_PROVIDER=${ACTIVE_LLM_PROVIDER:-openai}

      # Security Configuration (Required for JWT authentication)
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-480}

      # Storage
      - DATA_DIR=/app/data
      - UPLOAD_DIR=/app/uploads
      - REPORTS_DIR=/app/reports
      - CHROMA_PERSIST_DIR=/app/chroma_db

      # Agent Settings
      - VOICE_ENABLED=${VOICE_ENABLED:-true}
      - REQUIRE_HUMAN_APPROVAL=${REQUIRE_HUMAN_APPROVAL:-true}
      - DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE:-en}
      
    volumes:
      # Persist data
      - app_data:/app/data
      - app_uploads:/app/uploads
      - app_reports:/app/reports
      - app_chroma:/app/chroma_db
      
      # For development, mount source code
      - .:/app:cached
    extra_hosts:
      - "host.docker.internal:host-gateway"
      
    depends_on:
      reviewbot-db:
        condition: service_healthy
    networks:
      - ai-review-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # --------------------------------------------
  # Database Service (PostgreSQL)
  # --------------------------------------------
  reviewbot-db:
    image: postgres:15-alpine
    container_name: reviewbot-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_admin_password
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db-simple.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "${DB_PORT:-5435}:5432"
    networks:
      - ai-review-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

